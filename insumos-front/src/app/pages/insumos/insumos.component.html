<h2>Cadastro de Insumos</h2>

<div *ngIf="mensagemSucesso" style="color: green;">
  {{ mensagemSucesso }}
</div>

<div *ngIf="mensagemErro" style="color: red;">
  {{ mensagemErro }}
</div>

<form (ngSubmit)="adicionar()">
  <input type="text" placeholder="Nome" [(ngModel)]="novoInsumo.nome" name="nome" required>
  <input type="text" placeholder="Unidade" [(ngModel)]="novoInsumo.unidadeMedida" name="unidade" required>
  <input type="number" step="0.01" [(ngModel)]="novoInsumo.custo" placeholder="Custo (R$)" />
  <button (click)="adicionar()" [disabled]="!novoInsumo.nome || !novoInsumo.unidadeMedida || !novoInsumo.custo">
  Adicionar
</button>
</form>

<hr>

<div *ngIf="loading">Carregando...</div>

<table *ngIf="insumos.length > 0">
  <tr>
    <th>Nome</th>
    <th>Unidade</th>
    <th>Custo</th>
    <th>Ação</th>
  </tr>

  <tr *ngFor="let insumo of insumos">
    <td>{{ insumo.nome }}</td>
    <td>{{ insumo.unidadeMedida }}</td>
    <td>{{ insumo.custo }}</td>
    <td>
      <button (click)="deletar(insumo.id)">Excluir</button>
    </td>
  </tr>
</table>

<div *ngIf="!loading && insumos.length === 0">
  Nenhum insumo cadastrado
</div>
